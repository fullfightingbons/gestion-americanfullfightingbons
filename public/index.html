<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="same-origin">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>AFFBC — Gestion du club</title>
<script>


// Charge d'abord un asset local, puis bascule sur un CDN si nécessaire.
(function(){
  function loadScript(urls,onLoad){
    var i=0;
    function next(){
      if(i>=urls.length) return;
      var s=document.createElement('script');
      s.src=urls[i++];
      s.defer=true;
      s.onload=function(){ if(onLoad) onLoad(); };
      s.onerror=next;
      document.head.appendChild(s);
    }
    next();
  }
  loadScript([
    '/vendor/pdfjs/pdf.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
    'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js'
  ],function(){
    if(window.pdfjsLib){
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='/vendor/pdfjs/pdf.worker.min.js';
    }
  });
})();
</script>
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<noscript>
  <div style="padding:24px;max-width:640px;margin:40px auto;background:#fff;border:1px solid #ddd;border-radius:16px;font-family:sans-serif">
    <h1 style="font-size:22px;margin-bottom:12px">JavaScript requis</h1>
    <p>Cette application de gestion nécessite JavaScript pour fonctionner correctement.</p>
  </div>
</noscript>

<div id="app-notices" class="notice-stack" aria-live="polite" aria-atomic="false"></div>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-box">
    <div class="logo" id="login-logo">🥊</div>
    <h1 id="login-club-nom">American Full Fighting<br>Bons en Chablais</h1>
    <p>Connectez-vous pour accéder au logiciel</p>
    <div class="login-err" id="login-err">Email ou mot de passe incorrect</div>
    <div class="fg" style="text-align:left"><label>Email</label><input id="l-email" type="email" placeholder="Votre adresse email" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg" style="margin:12px 0;text-align:left"><label>Mot de passe</label><input id="l-pwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn primary" style="width:100%;padding:10px" onclick="doLogin()">Se connecter</button>
    <p class="login-hint">Utilisez votre compte administrateur du club.</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="hdr">
    <div class="logo-wrap" id="global-logo"><span style="font-size:28px">🥊</span></div>
    <div class="hdr-info">
      <h1 id="hdr-nom">American Full Fighting Bons en Chablais</h1>
      <p>Logiciel de gestion</p>
    </div>
    <div class="hdr-right">
      <div class="exo-badge" id="exo-badge">—</div>
      <div class="conn-ok">✓ Cloudflare</div>
      <div class="user-pill" onclick="showTab('administration')">
        <div class="udot"></div>
        <span id="cu-name">—</span>&nbsp;·&nbsp;<span id="cu-role">—</span>
      </div>
      <button class="btn sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)" onclick="openPasswordModal()">Mot de passe</button>
      <button class="btn sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="tabs-wrap" id="tabs-bar"></div>
  <div class="content" id="tab-content"></div>
</div>

<!-- INPUTS CACHÉS -->
<input type="file" id="pdf-input"     accept="application/pdf" style="display:none" onchange="attachPDF(event)">
<input type="file" id="csv-bank"      accept=".csv,.txt"       style="display:none" onchange="importBankCSV(event)">
<input type="file" id="bank-pdf-input" accept="application/pdf" style="display:none" onchange="importBankPDF(event)">
<input type="file" id="logo-input"    accept="image/*"         style="display:none" onchange="importLogo(event)">
<input type="file" id="diplome-signature-input" accept="image/*" style="display:none" onchange="importDiplomeSignature(event)">
<input type="file" id="imp-adh-file"  accept=".csv,.txt"       style="display:none" onchange="onImpAdhFile(event)">
<input type="file" id="imp-ecr-file"  accept=".csv,.txt"       style="display:none" onchange="onImpEcrFile(event)">
<input type="file" id="backup-json-input" accept=".json,application/json" style="display:none" onchange="onBackupJSONFile(event)">

<script src="/assets/app.js" defer></script>
</body>
</html>
